name: Fixium Code Review Bot

on:
  issue_comment:
    types: [created]

# Only allow one review per PR at a time
concurrency:
  group: fixium-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fixium-review:
    # Only run on PR comments that contain "Fixium:review"
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'Fixium:review')
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the PR branch
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Bob CLI
        run: |
          # TODO: Add actual Bob CLI installation
          # For now, assume it's available in the environment
          echo "Bob CLI installation placeholder"
      
      - name: Set environment variables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          FIXIUM_AUTHORIZED_USERS: ${{ secrets.FIXIUM_AUTHORIZED_USERS }}
        run: |
          echo "GITHUB_TOKEN=${GITHUB_TOKEN}" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" >> $GITHUB_ENV
          echo "GITHUB_OWNER=${GITHUB_REPOSITORY_OWNER}" >> $GITHUB_ENV
          echo "GITHUB_REPO=$(echo ${GITHUB_REPOSITORY} | cut -d'/' -f2)" >> $GITHUB_ENV
          echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
          echo "COMMENT_BODY=${{ github.event.comment.body }}" >> $GITHUB_ENV
          echo "COMMENT_USER=${{ github.event.comment.user.login }}" >> $GITHUB_ENV
          echo "BOBSHELL_API_KEY=${BOBSHELL_API_KEY}" >> $GITHUB_ENV
          echo "FIXIUM_AUTHORIZED_USERS=${FIXIUM_AUTHORIZED_USERS}" >> $GITHUB_ENV
      
      - name: Run Fixium Code Review
        run: |
          python -m fixium.main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          FIXIUM_AUTHORIZED_USERS: ${{ secrets.FIXIUM_AUTHORIZED_USERS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_ENABLED: 'true'
      
      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixium-review-${{ github.event.issue.number }}
          path: |
            ${{ github.workspace }}/review_pr${{ github.event.issue.number }}.json
          retention-days: 30
          if-no-files-found: ignore
  
  fixium-docs:
    # Only run on PR comments that contain "Fixium:updatedocs"
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'Fixium:updatedocs')
    
    runs-on: ubuntu-latest
    
    # Prevent concurrent doc analysis on same PR
    concurrency:
      group: fixium-docs-${{ github.event.issue.number }}
      cancel-in-progress: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the PR branch
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Bob CLI
        run: |
          # TODO: Add actual Bob CLI installation
          # For now, assume it's available in the environment
          echo "Bob CLI installation placeholder"
      
      - name: Run Documentation Analysis
        run: |
          python -m fixium.doc_main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          FIXIUM_AUTHORIZED_USERS: ${{ secrets.FIXIUM_AUTHORIZED_USERS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_ENABLED: 'true'
      
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixium-docs-${{ github.event.issue.number }}
          path: |
            docs_analysis_pr${{ github.event.issue.number }}.json
          retention-days: 30
          if-no-files-found: ignore
  
  fixium-impact:
    # Only run on issue comments (not PR) that contain "Fixium:analyzeimpact"
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, 'Fixium:analyzeimpact')
    
    runs-on: ubuntu-latest
    
    # Prevent concurrent impact analysis on same issue
    concurrency:
      group: fixium-impact-${{ github.event.issue.number }}
      cancel-in-progress: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Bob CLI
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash
          bob --version
      
      - name: Install Node.js for MCP
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Configure Bob MCP for Neo4j
        run: |
          bash scripts/configure_bob_mcp.sh
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
      
      - name: Run Impact Analysis
        run: |
          python -m fixium.impact_main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          FIXIUM_AUTHORIZED_USERS: ${{ secrets.FIXIUM_AUTHORIZED_USERS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_ENABLED: 'true'
      
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixium-impact-${{ github.event.issue.number }}
          path: |
            impact_analysis_issue${{ github.event.issue.number }}.json
          retention-days: 30
          if-no-files-found: ignore


